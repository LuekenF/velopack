name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ohne v-Prefix, z.B. 1.2.2)'
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: .NET 8 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: vpk CLI installieren
        run: dotnet tool install -g vpk

      - name: Version aus Tag lesen
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "VERSION=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "VERSION=$($env:GITHUB_REF_NAME -replace '^v','')" >> $env:GITHUB_OUTPUT
          }

      - name: Publishen
        run: dotnet publish VelopackDemo/VelopackDemo.csproj -c Release -r win-x64 --self-contained false -o VelopackDemo/publish /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Zertifikat in Cert-Store importieren
        id: cert
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.CERT_PFX }}")
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          $pwd = ConvertTo-SecureString -String "${{ secrets.CERT_PASSWORD }}" -Force -AsPlainText
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation "Cert:\CurrentUser\My" -Password $pwd
          echo "THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT

      - name: Vorheriges Release herunterladen (für Delta-Paket)
        run: |
          $tag = gh release list --limit 1 --json tagName -q '.[0].tagName'
          if ($tag) {
            Write-Host "Lade Pakete von Release $tag herunter..."
            New-Item -ItemType Directory -Force VelopackDemo/releases | Out-Null
            gh release download $tag --dir VelopackDemo/releases --pattern "*.nupkg" --skip-existing
          } else {
            Write-Host "Kein vorheriges Release gefunden, erstelle Full-Paket."
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Velopack paketieren & signieren
        run: |
          Write-Host "Prüfe app.ico..."
          Test-Path VelopackDemo/app.ico
          Get-Item VelopackDemo/app.ico

          vpk pack `
            --packId VelopackDemo `
            --packVersion ${{ steps.version.outputs.VERSION }} `
            --packDir VelopackDemo/publish `
            --mainExe VelopackDemo.exe `
            --icon VelopackDemo/app.ico `
            --framework net8-x64-desktop `
            --outputDir VelopackDemo/releases `
            --signParams "/sha1 ${{ steps.cert.outputs.THUMBPRINT }} /fd sha256 /tr http://timestamp.sectigo.com /td sha256"

      - name: GitHub Release erstellen & Dateien hochladen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: VelopackDemo/releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
