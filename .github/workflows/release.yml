name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: .NET 8 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: vpk CLI installieren
        run: dotnet tool install -g vpk

      - name: Version aus Tag lesen
        id: version
        run: echo "VERSION=$($env:GITHUB_REF_NAME -replace '^v','')" >> $env:GITHUB_OUTPUT

      - name: Publishen
        run: dotnet publish VelopackDemo/VelopackDemo.csproj -c Release -r win-x64 --self-contained true -o VelopackDemo/publish

      - name: Velopack paketieren
        run: |
          vpk pack `
            --packId VelopackDemo `
            --packVersion ${{ steps.version.outputs.VERSION }} `
            --packDir VelopackDemo/publish `
            --mainExe VelopackDemo.exe `
            --outputDir VelopackDemo/releases

      - name: GitHub Release erstellen & Dateien hochladen
        uses: softprops/action-gh-release@v2
        with:
          files: VelopackDemo/releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
